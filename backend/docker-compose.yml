version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lms_postgres_db
    restart: always
    environment:
      POSTGRES_DB: enterprise_lms_db
      POSTGRES_USER: lms_admin
      POSTGRES_PASSWORD: admin_secure_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms-network

  redis:
    image: redis:7.0-alpine
    container_name: lms_redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lms-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  lms-network:
    driver: bridge
